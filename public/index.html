<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Chat</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; height: 100vh; display: flex; justify-content: center; align-items: center;
      background: #0f172a; font-family: system-ui, sans-serif; color: #e2e8f0; }
    #chat { width: 100%; max-width: 600px; height: 80vh; display: flex; flex-direction: column;
      background: #1e293b; border-radius: 16px; overflow: hidden; }
    #thread { flex: 1; padding: 16px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
    .bubble { max-width: 75%; padding: 10px 14px; border-radius: 16px; line-height: 1.4; }
    .user { align-self: flex-end; background: #2563eb; color: #fff; border-bottom-right-radius: 4px; }
    .ai { align-self: flex-start; background: #334155; border-bottom-left-radius: 4px; }
    #form { display: flex; gap: 8px; padding: 12px; border-top: 1px solid #334155; }
    #input { flex: 1; padding: 10px 14px; border-radius: 999px; border: none; background: #0f172a;
      color: #e2e8f0; font-size: 15px; outline: none; }
    button { padding: 10px 20px; border-radius: 999px; border: none; background: #2563eb;
      color: #fff; font-size: 15px; cursor: pointer; }
  </style>
</head>
<body>
  <div id="chat">
    <div id="thread"></div>
    <form id="form">
      <input id="input" placeholder="Type a message..." autocomplete="off" />
      <button type="submit">Send</button>
    </form>
  </div>
  <script>
    const thread = document.getElementById("thread");
    const form = document.getElementById("form");
    const input = document.getElementById("input");

    function addBubble(text, who) {
      const div = document.createElement("div");
      div.className = "bubble " + who;
      div.textContent = text;
      thread.appendChild(div);
      thread.scrollTop = thread.scrollHeight;
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      const message = input.value.trim();
      if (!message) return;
      addBubble(message, "user");
      input.value = "";
      const res = await fetch("/api/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message }),
      });
      const data = await res.json();
      addBubble(data.reply, "ai");
    });
  </script>
</body>
</html>
