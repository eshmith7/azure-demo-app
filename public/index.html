<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>AI Chat</title>
  <style>
    :root{
      --bg:#0a0708;
      --surface:#141011;
      --surface-2:#1c1719;
      --surface-3:#271f21;
      --border:rgba(255,255,255,.08);
      --border-strong:rgba(255,255,255,.14);
      --gold-border:rgba(230,181,60,.4);
      --text:#f1eceb;
      --text-dim:#a9a1a2;
      --text-faint:#8a8285;
      --red:#d81f26;
      --gold:#e6b53c;
      --gold-ink:#1a1205;
      --font:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Oxygen,Ubuntu,Cantarell,"Helvetica Neue",Arial,sans-serif;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%}
    body{
      font-family:var(--font);background:var(--bg);color:var(--text);
      min-height:100dvh;display:flex;align-items:center;justify-content:center;padding:24px;
      -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;
    }
    body::before{
      content:"";position:fixed;inset:0;pointer-events:none;z-index:0;
      background:
        radial-gradient(950px 520px at 50% -10%,rgba(216,31,38,.18),transparent 62%),
        radial-gradient(700px 520px at 100% 112%,rgba(230,181,60,.07),transparent 60%);
    }

    .app{
      position:relative;z-index:1;width:100%;max-width:720px;
      height:min(880px,calc(100dvh - 48px));
      display:flex;flex-direction:column;
      background:var(--surface);border:1px solid var(--border);border-radius:20px;
      box-shadow:inset 0 1px 0 rgba(255,255,255,.04),0 30px 70px -25px rgba(0,0,0,.9);
      overflow:hidden;
    }
    .app::before{
      content:"";position:absolute;top:0;left:0;right:0;height:3px;z-index:5;
      background:linear-gradient(90deg,var(--red),var(--gold) 50%,var(--red));
    }

    .app-header{
      display:flex;align-items:center;justify-content:space-between;
      padding:16px 20px;border-bottom:1px solid var(--border);
      background:linear-gradient(180deg,rgba(255,255,255,.025),transparent);
    }
    .brand{font-size:16px;font-weight:800;letter-spacing:.06em}
    .brand span{color:var(--gold)}
    .status{display:flex;align-items:center;gap:7px;font-size:11.5px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--text-dim)}
    .dot{position:relative;width:8px;height:8px;border-radius:50%;background:var(--gold)}
    .dot::after{content:"";position:absolute;inset:0;border-radius:50%;background:var(--gold);animation:ping 2.4s ease-out infinite}
    @keyframes ping{0%{transform:scale(1);opacity:.6}70%,100%{transform:scale(2.8);opacity:0}}

    .thread{
      flex:1;overflow-y:auto;padding:24px;display:flex;flex-direction:column;gap:14px;
      scroll-behavior:smooth;scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.16) transparent;
    }
    .thread::-webkit-scrollbar{width:8px}
    .thread::-webkit-scrollbar-thumb{background:rgba(255,255,255,.14);border-radius:8px;border:2px solid transparent;background-clip:padding-box}
    .thread::-webkit-scrollbar-thumb:hover{background:rgba(216,31,38,.55);background-clip:padding-box}

    .msg{display:flex;animation:msgIn .26s cubic-bezier(.22,1,.36,1)}
    .msg.user{justify-content:flex-end}
    .msg.ai{justify-content:flex-start}
    .bubble{
      max-width:78%;padding:11px 15px;font-size:15px;line-height:1.55;border-radius:18px;
      white-space:pre-wrap;word-wrap:break-word;overflow-wrap:anywhere;
    }
    .user .bubble{background:linear-gradient(180deg,#e0232b,#bd1820);color:#fff;font-weight:500;border-bottom-right-radius:6px;box-shadow:0 6px 18px -8px rgba(216,31,38,.6)}
    .ai .bubble{background:var(--surface-2);color:var(--text);border:1px solid var(--border);border-bottom-left-radius:6px}
    @keyframes msgIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}

    .typing{display:flex;align-items:center;gap:5px;padding:15px 16px}
    .typing span{width:7px;height:7px;border-radius:50%;background:var(--gold);animation:blink 1.4s ease-in-out infinite}
    .typing span:nth-child(2){animation-delay:.18s}
    .typing span:nth-child(3){animation-delay:.36s}
    @keyframes blink{0%,80%,100%{opacity:.3;transform:translateY(0)}40%{opacity:1;transform:translateY(-3px)}}

    .welcome{position:relative;margin:auto;max-width:440px;padding:24px 8px;text-align:center}
    .welcome::before{
      content:"";position:absolute;left:50%;top:-14%;width:320px;height:320px;transform:translateX(-50%);
      background:radial-gradient(circle,rgba(216,31,38,.2),transparent 60%);pointer-events:none;
    }
    .eyebrow{display:inline-block;font-size:12px;font-weight:800;letter-spacing:.22em;text-transform:uppercase;color:var(--gold);margin-bottom:14px}
    .welcome h1{font-size:34px;font-weight:800;letter-spacing:.02em;margin-bottom:8px}
    .welcome h1 b{color:var(--red);font-weight:800}
    .welcome .rule{width:54px;height:3px;margin:0 auto 16px;border-radius:3px;background:linear-gradient(90deg,var(--red),var(--gold))}
    .welcome p{color:var(--text-dim);font-size:15px;margin-bottom:22px}
    .chips{display:flex;flex-wrap:wrap;gap:9px;justify-content:center}
    .chip{
      font:inherit;font-size:13.5px;color:var(--text);background:var(--surface-2);
      border:1px solid var(--border);padding:9px 14px;border-radius:12px;cursor:pointer;
      transition:border-color .18s,background .18s,transform .18s;
    }
    .chip:hover{background:var(--surface-3);border-color:var(--gold-border);transform:translateY(-1px)}

    .composer{padding:14px 16px 18px;border-top:1px solid var(--border);background:linear-gradient(0deg,rgba(0,0,0,.18),transparent)}
    .input-shell{
      display:flex;align-items:flex-end;gap:8px;background:var(--surface-2);
      border:1px solid var(--border);border-radius:16px;padding:8px 8px 8px 14px;
      transition:border-color .18s,box-shadow .18s;
    }
    .input-shell:focus-within{border-color:var(--red);box-shadow:0 0 0 4px rgba(216,31,38,.18)}
    #input{
      flex:1;border:none;outline:none;background:transparent;resize:none;color:var(--text);
      font:inherit;font-size:15px;line-height:1.5;max-height:78px;padding:5px 0;overflow-y:auto;
      scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.16) transparent;
    }
    #input::placeholder{color:var(--text-faint)}
    .send{
      flex:none;width:36px;height:36px;border:none;border-radius:12px;cursor:pointer;
      background:linear-gradient(180deg,#e0232b,#c41a22);color:#fff;
      display:grid;place-items:center;transition:transform .15s,filter .15s,opacity .15s;
      box-shadow:0 6px 16px -8px rgba(216,31,38,.7);
    }
    .send:hover:not(:disabled){filter:brightness(1.08);transform:translateY(-1px)}
    .send:active:not(:disabled){transform:scale(.94)}
    .send:disabled{opacity:.4;cursor:not-allowed;box-shadow:none}

    .chip:focus-visible,.send:focus-visible{outline:2px solid var(--gold);outline-offset:2px}
    .sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}

    @media (max-width:600px){
      body{padding:0}
      body::before{display:none}
      .app{height:100dvh;max-width:none;border:none;border-radius:0;box-shadow:none}
      .thread{padding:16px;gap:12px}
      .bubble{max-width:86%}
      .composer{padding:12px 12px calc(12px + env(safe-area-inset-bottom))}
      .welcome h1{font-size:28px}
    }
    @media (prefers-reduced-motion:reduce){
      *{animation:none!important;transition:none!important;scroll-behavior:auto!important}
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="app-header">
      <div class="brand">AI <span>CHAT</span></div>
      <div class="status"><span class="dot" aria-hidden="true"></span><span>Live</span></div>
    </header>

    <section id="thread" class="thread" role="log" aria-live="polite" aria-relevant="additions" aria-label="Chat messages">
      <div class="welcome" id="welcome">
        <span class="eyebrow">Play Bold</span>
        <h1>AI <b>CHAT</b></h1>
        <div class="rule"></div>
        <p>Ask me anything to get started</p>
        <div class="chips">
          <button class="chip" type="button">Explain a complex topic simply</button>
          <button class="chip" type="button">Help me draft an email</button>
          <button class="chip" type="button">Give me ideas for a project</button>
        </div>
      </div>
    </section>

    <form id="composer" class="composer">
      <label for="input" class="sr-only">Message</label>
      <div class="input-shell">
        <textarea id="input" rows="1" placeholder="Send a message…" autocomplete="off"
          enterkeyhint="send" aria-label="Message"></textarea>
        <button id="send" class="send" type="submit" aria-label="Send message" disabled>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
            <path d="M3.4 20.4l17.45-7.48a1 1 0 0 0 0-1.84L3.4 3.6a.993.993 0 0 0-1.39.91L2 9.12c0 .51.36.94.87 1L17 12 2.87 13.88c-.51.07-.87.5-.87 1l.01 4.61c0 .67.73 1.15 1.39.9z"/>
          </svg>
        </button>
      </div>
    </form>
  </main>

  <script>
    const thread = document.getElementById("thread");
    const form = document.getElementById("composer");
    const input = document.getElementById("input");
    const send = document.getElementById("send");
    const welcome = document.getElementById("welcome");
    let busy = false;

    function autosize() {
      input.style.height = "auto";
      input.style.height = Math.min(input.scrollHeight, 78) + "px";
    }
    function scrollToBottom() {
      thread.scrollTo({ top: thread.scrollHeight, behavior: "smooth" });
    }
    function updateSend() {
      send.disabled = busy || input.value.trim() === "";
    }
    function setBusy(state) {
      busy = state;
      input.disabled = state;
      updateSend();
    }

    function addMessage(text, who) {
      if (welcome && welcome.parentNode) welcome.remove();
      const row = document.createElement("div");
      row.className = "msg " + who;
      const bubble = document.createElement("div");
      bubble.className = "bubble";
      bubble.textContent = text;
      row.appendChild(bubble);
      thread.appendChild(row);
      scrollToBottom();
    }

    function showTyping() {
      const row = document.createElement("div");
      row.className = "msg ai";
      row.id = "typing";
      row.setAttribute("aria-hidden", "true");
      row.innerHTML = '<div class="bubble typing"><span></span><span></span><span></span></div>';
      thread.appendChild(row);
      scrollToBottom();
    }
    function hideTyping() {
      const t = document.getElementById("typing");
      if (t) t.remove();
    }

    async function sendMessage(text) {
      addMessage(text, "user");
      input.value = "";
      autosize();
      setBusy(true);
      showTyping();
      try {
        const res = await fetch("/api/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message: text }),
        });
        if (!res.ok) throw new Error("HTTP " + res.status);
        const data = await res.json();
        hideTyping();
        addMessage(data && data.reply ? data.reply : "(No response received.)", "ai");
      } catch (err) {
        hideTyping();
        addMessage("Sorry — I couldn’t reach the server. Please try again.", "ai");
      } finally {
        setBusy(false);
        input.focus();
      }
    }

    form.addEventListener("submit", (e) => {
      e.preventDefault();
      const text = input.value.trim();
      if (!text || busy) return;
      sendMessage(text);
    });

    input.addEventListener("input", () => { autosize(); updateSend(); });
    input.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        const text = input.value.trim();
        if (text && !busy) sendMessage(text);
      }
    });

    document.querySelectorAll(".chip").forEach((chip) => {
      chip.addEventListener("click", () => {
        input.value = chip.textContent.trim();
        autosize();
        updateSend();
        input.focus();
      });
    });

    updateSend();
  </script>
</body>
</html>
