name: Deploy to Azure App Service
 
on:
  push:
    branches:
      - main
  workflow_dispatch:   # lets you also trigger it manually from the Actions tab
 
env:
  AZURE_WEBAPP_NAME: testChat   # your App Service name (from the portal)
  NODE_VERSION: '20.x'          # set this to match the Node version on your App Service
 
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
 
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
 
      - name: Install dependencies and build
        run: |
          npm install
          npm run build --if-present   # runs only if a "build" script exists (e.g. React)
 
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE_TESTCHAT }}
          package: .
 
